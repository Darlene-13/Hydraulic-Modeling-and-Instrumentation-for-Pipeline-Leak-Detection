spring:
  # ── Database ───────────────────────────────────────────────
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 5
      minimum-idle: 2
      idle-timeout: 300000
      pool-name: LeakDetectionPool

  # ── Redis ──────────────────────────────────────────────────
  # Uncomment when Redis Cloud is ready
  # data:
  #   redis:
  #     host: ${REDIS_HOST}
  #     port: ${REDIS_PORT}
  #     password: ${REDIS_PASSWORD}
  #     ssl:
  #       enabled: true

  # ── JPA ────────────────────────────────────────────────────
  jpa:
    show-sql: true

  # ── Logging ────────────────────────────────────────────────
logging:
  level:
    root: INFO
    io.github.darlene: DEBUG
    org.springframework.integration.mqtt: DEBUG
    com.zaxxer.hikari: DEBUG

# ── MQTT ───────────────────────────────────────────────────────
mqtt:
  broker-url: ${MQTT_BROKER_URL}
  username: ${MQTT_USERNAME}
  password: ${MQTT_PASSWORD}

# ── ML Service ─────────────────────────────────────────────────
ml-service:
  base-url: ${ML_SERVICE_URL:http://localhost:5000}
  timeout-seconds: 10