spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/leakdetection
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  logging:
    level:
      root: INFO
      io.github.darlene: DEBUG
      org.hibernate.SQL: DEBUG

server:
  error:
    include-message: always
    include-stacktrace: on_param

mqtt:
  broker-url: tcp://localhost:1883

ml-service:
  base-url: http://localhost:5000

ollama:
  base-url: http://localhost:11434
  model: llama3