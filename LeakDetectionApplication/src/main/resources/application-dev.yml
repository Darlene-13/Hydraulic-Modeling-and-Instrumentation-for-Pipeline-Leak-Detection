spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 5
      minimum-idle: 2
      idle-timeout: 300000
      pool-name: LeakDetectionPool

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

server:
  port: ${PORT:8080}

logging:
  level:
    root: INFO
    io.github.darlene: INFO
    org.springframework.integration.mqtt: WARN
    com.zaxxer.hikari: WARN

mqtt:
  broker-url: ${MQTT_BROKER_URL}
  username: ${MQTT_USERNAME}
  password: ${MQTT_PASSWORD}

ml:
  service:
    url: ${ML_SERVICE_URL:http://localhost:5000}
    connect-timeout-ms: ${ML_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${ML_READ_TIMEOUT_MS:5000}

redis:
  cache:
    ttl-seconds: ${REDIS_CACHE_TTL_SECONDS:300}

app:
  cors:
    allowed-origins:
      - https://ai-pipeline-leak-detection.onrender.com