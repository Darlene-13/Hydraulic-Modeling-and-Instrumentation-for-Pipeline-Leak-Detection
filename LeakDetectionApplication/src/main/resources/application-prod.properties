# ── Database ────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.pool-name=LeakDetectionPool

# ── JPA ─────────────────────────────────────────────────────────────────────
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ── Flyway ──────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false

# ── Redis ────────────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true

# ── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
server.error.include-message=never
server.error.include-stacktrace=never

# ── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# ── AI / Groq ────────────────────────────────────────────────────────────────
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=${GROK_API_BASE_URL}
spring.ai.openai.chat.options.model=${GROQ_MODEL:llama-3.3-70b-versatile}

# ── MQTT ─────────────────────────────────────────────────────────────────────
mqtt.broker-url=${MQTT_BROKER_URL}
mqtt.username=${MQTT_USERNAME}
mqtt.password=${MQTT_PASSWORD}
mqtt.topics.sensor-data=pipeline/sensors/node
mqtt.topics.led-status=pipeline/led/status
mqtt.topics.alerts=pipeline/alerts/default

# ── ML Service ───────────────────────────────────────────────────────────────
ml.service.url=${ML_SERVICE_URL:http://localhost:5000}
ml.service.connect-timeout-ms=${ML_CONNECT_TIMEOUT_MS:3000}
ml.service.read-timeout-ms=${ML_READ_TIMEOUT_MS:5000}

# ── Redis Cache ───────────────────────────────────────────────────────────────
redis.cache.ttl-seconds=${REDIS_CACHE_TTL_SECONDS:300}

# ── WebSocket ─────────────────────────────────────────────────────────────────
websocket.endpoint=/ws/alerts

# ── CORS ──────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=https://ai-pipeline-leak-detection.onrender.com

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.io.github.darlene=INFO
logging.level.org.springframework.integration.mqtt=WARN
logging.level.com.zaxxer.hikari=WARN