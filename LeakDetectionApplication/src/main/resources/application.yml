spring:
  application:
    name: LeakDetectionApplication

  profiles:
    active: dev

  # ── Database ───────────────────────────────────────────────────
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 5
      minimum-idle: 2
      idle-timeout: 300000
      pool-name: LeakDetectionPool

  # ── JPA / Hibernate ────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  # ── Flyway ─────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Jackson ────────────────────────────────────────────────────
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false

  # ── Redis (Week 4) ─────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true

# ── Server ───────────────────────────────────────────────────────
server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never

# ── JWT ──────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000

# ── ML Service ───────────────────────────────────────────────────
ml-service:
  base-url: ${ML_SERVICE_URL}
  timeout-seconds: 10

# ── WebSocket ────────────────────────────────────────────────────
websocket:
  endpoint: /ws/alerts