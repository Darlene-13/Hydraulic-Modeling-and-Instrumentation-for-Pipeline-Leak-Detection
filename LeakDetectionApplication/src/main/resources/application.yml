spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: LeakDetectionApplication

  profiles:
    active: dev

  integration:
    channel:
      auto-create: true

  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000

websocket:
  endpoint: /ws/alerts

ml-service:
  base-url: ${ML_SERVICE_URL}
  timeout-seconds: 10