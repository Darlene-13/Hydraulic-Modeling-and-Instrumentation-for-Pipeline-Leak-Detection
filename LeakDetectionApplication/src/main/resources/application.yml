spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: LeakDetectionApplication
  profiles:
    active: dev
  integration:
    channel:
      auto-create: true
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  ai:
    openai:
      api-key: ${GROQ_API_KEY}
      base-url: ${GROK_API_BASE_URL}
      chat:
        options:
          model: ${GROQ_MODEL:llama-3.3-70b-versatile}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: ${REDIS_SSL:false}

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000

websocket:
  endpoint: /ws/alerts

ml:
  service:
    url: ${ML_SERVICE_URL:http://localhost:5000}
    connect-timeout-ms: ${ML_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${ML_READ_TIMEOUT_MS:5000}

mqtt:
  broker-url: ${MQTT_BROKER_URL}
  username: ${MQTT_USERNAME}
  password: ${MQTT_PASSWORD}
  topics:
    sensor-data: pipeline/sensors/node
    led-status: pipeline/led/status
    alerts: pipeline/alerts/default

redis:
  cache:
    ttl-seconds: ${REDIS_CACHE_TTL_SECONDS:300}

app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - https://ai-pipeline-leak-detection.onrender.com