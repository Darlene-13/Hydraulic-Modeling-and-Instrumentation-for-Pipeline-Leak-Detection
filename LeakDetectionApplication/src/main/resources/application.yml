spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: LeakDetectionApplication

  profiles:
    active: dev

  integration:
    channel:
      auto-create: true

  # ── JPA / Hibernate ──────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  # ── Flyway ───────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

# ── Server ─────────────────────────────────────────────────────
server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never

# ── JWT ────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000

# ── WebSocket ──────────────────────────────────────────────────
websocket:
  endpoint: /ws/alerts