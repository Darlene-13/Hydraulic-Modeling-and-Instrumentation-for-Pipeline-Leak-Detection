spring:
  application:
  name: LeakDetectionApplication

  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000

mqtt:
  broker-url: ${MQTT_BROKER_URL}
  client-id: spring-backend-client
  topics:
    sensor-data: pipeline/sensors/node
    led-status: pipeline/led/status

ml-service:
  base-url: ${ML_SERVICE_URL}
  timeout-seconds: 10

websocket:
  endpoint: /ws/alerts