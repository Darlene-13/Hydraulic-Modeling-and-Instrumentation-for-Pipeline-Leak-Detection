spring:
  # ── Database ───────────────────────────────────────────────
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      pool-name: LeakDetectionPool

  # ── Redis ──────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true

  # ── JPA ────────────────────────────────────────────────────
  jpa:
    show-sql: false

  # ── Logging ────────────────────────────────────────────────
logging:
  level:
    root: WARN
    io.github.darlene: INFO

# ── MQTT ───────────────────────────────────────────────────────
mqtt:
  broker-url: ${MQTT_BROKER_URL}
  username: ${MQTT_USERNAME}
  password: ${MQTT_PASSWORD}

# ── ML Service ─────────────────────────────────────────────────
ml-service:
  base-url: ${ML_SERVICE_URL}
  timeout-seconds: 5

# ── Server ─────────────────────────────────────────────────────
server:
  error:
    include-message: never
    include-stacktrace: never