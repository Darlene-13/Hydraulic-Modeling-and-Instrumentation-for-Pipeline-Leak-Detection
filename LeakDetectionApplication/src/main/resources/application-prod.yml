# =============================================================================
# Production Profile — overrides application.yml defaults only
# Active via: spring.profiles.active=prod
# All sensitive values MUST be injected as environment variables
# =============================================================================

spring:
  # ---------------------------------------------------------------------------
  # Database
  # ---------------------------------------------------------------------------
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: LeakDetectionPool
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 300000

  # ---------------------------------------------------------------------------
  # Redis — SSL enforced in prod
  # ---------------------------------------------------------------------------
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true

  # ---------------------------------------------------------------------------
  # JPA — no DDL changes in prod; Flyway owns migrations
  # ---------------------------------------------------------------------------
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

# =============================================================================
# MQTT Broker Connection
# =============================================================================
mqtt:
  broker-url: ${MQTT_BROKER_URL}
  username: ${MQTT_USERNAME}
  password: ${MQTT_PASSWORD}

# =============================================================================
# ML Service
# =============================================================================
ml:
  service:
    base-url: ${ML_SERVICE_URL}
    timeout-seconds: 5
    read-timeout-ms: ${ML_READ_TIMEOUT_MS:5000}

# =============================================================================
# Redis Cache
# =============================================================================
redis:
  cache:
    ttl-seconds: ${REDIS_CACHE_TTL_SECONDS:300}

# =============================================================================
# Logging — minimal noise in prod; your package stays INFO
# =============================================================================
logging:
  level:
    root: WARN
    io.github.darlene: INFO

# =============================================================================
# Server — harden error responses
# =============================================================================
server:
  error:
    include-message: never
    include-stacktrace: never


app:
  cors:
    allowed-origins:
      - https://ai-pipeline-leak-detection.onrender.com