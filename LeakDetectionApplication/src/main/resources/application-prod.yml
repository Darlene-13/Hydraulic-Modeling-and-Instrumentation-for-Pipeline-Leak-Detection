
# Production Profile — overrides application.yml defaults only
# Active via: spring.profiles.active=prod
# All sensitive values MUST be injected as environment variables


spring:

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: LeakDetectionPool
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 300000

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

mqtt:
  broker-url: ${MQTT_BROKER_URL}
  username: ${MQTT_USERNAME}
  password: ${MQTT_PASSWORD}

ml:
  service:
    base-url: ${ML_SERVICE_URL}
    timeout-seconds: 5
    read-timeout-ms: ${ML_READ_TIMEOUT_MS:5000}

redis:
  cache:
    ttl-seconds: ${REDIS_CACHE_TTL_SECONDS:300}

logging:
  level:
    root: WARN
    io.github.darlene: INFO

server:
  error:
    include-message: never
    include-stacktrace: never


app:
  cors:
    allowed-origins:
      - https://ai-pipeline-leak-detection.onrender.com